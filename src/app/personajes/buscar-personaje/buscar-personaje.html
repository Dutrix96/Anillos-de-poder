<div style="padding: 20px">
  <p-toast position="top-center"></p-toast>
  <p-confirmDialog></p-confirmDialog>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px">
    <h2>Lista de personajes</h2>
    <p-button label="Nuevo personaje" icon="pi pi-plus" [routerLink]="['/personajes/nuevo']"></p-button>
  </div>

  <p-table [value]="(personajes$ | async) ?? []" [tableStyle]="{ 'min-width': '50rem' }" stripedRows>
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="nombre">
          Nombre <p-sortIcon field="nombre"></p-sortIcon>
        </th>

        <th pSortableColumn="raza">
          Raza <p-sortIcon field="raza"></p-sortIcon>
        </th>

        <th pSortableColumn="nivelCorrupcion">
          Nivel de corrupcion <p-sortIcon field="nivelCorrupcion"></p-sortIcon>
        </th>

        <th pSortableColumn="fechaNacimiento">
          Fecha de nacimiento <p-sortIcon field="fechaNacimiento"></p-sortIcon>
        </th>

        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-personaje>
      <tr>
        <td>{{ personaje.nombre }}</td>
        <td>{{ personaje.raza }}</td>
        <td>
          <p-progressBar [value]="personaje.nivelCorrupcion" [showValue]="true"
            [style]="{ height: '18px' }"></p-progressBar>
        </td>
        <td>{{ personaje.fechaNacimiento }}</td>
        <td>
          <div style="display: flex; gap: 6px; align-items: center">
            <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="success"
              [routerLink]="['/personajes/editar', personaje.id]"></p-button>

            <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger"
              (onClick)="confirmarBajaFisica(personaje)"></p-button>

            @if (!personaje.fechaBaja) {
            <p-button icon="pi pi-ban" [rounded]="true" [text]="true" severity="secondary"
              (onClick)="confirmarBajaLogica(personaje)"></p-button>
            } @else {
            <p-button icon="pi pi-refresh" [rounded]="true" [text]="true" severity="info"
              (onClick)="confirmarReactivar(personaje)"></p-button>
            }
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" style="text-align: center">No hay personajes.</td>
      </tr>
    </ng-template>
  </p-table>

  @if (error) {
  <p style="margin-top: 12px; color: #b00020">
    {{ error }}
  </p>
  }
</div>
